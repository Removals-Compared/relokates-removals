name: Refresh dateModified

# Runs after every push to main. Walks every HTML page that carries a
# Speakable WebPage JSON-LD, derives dateModified from the file's actual
# git history (excluding this workflow's own past commits), and pushes
# any changes back to main. This keeps the AI-search freshness signal
# honest per page without any manual work.

on:
  push:
    branches: [main]

# Prevent two runs from racing on the same branch.
concurrency:
  group: refresh-date-modified
  cancel-in-progress: false

jobs:
  refresh:
    # Skip this workflow when its own commit triggered the push, to avoid
    # an infinite loop. The script's commit subject starts with the marker
    # we filter on.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore: refresh dateModified') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repo with full history
        uses: actions/checkout@v4
        with:
          # Full history is required so the script can read git log for
          # every file.
          fetch-depth: 0
          # Use a token that can push back to main.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run refresh script
        id: refresh
        run: |
          python3 scripts/refresh-date-modified.py

      - name: Commit and push if there are changes
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No dateModified changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "chore: refresh dateModified [skip ci]"
          git push
