<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Relokates Removals</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1A3C6E;--gold:#B8932A;--cream:#F4F8F6;--teal:#A8C5BC;--muted:#556070;--border:#c8ddd8}
*{box-sizing:border-box}html,body{height:100%;margin:0}
body{font-family:Inter,Arial,sans-serif;background:linear-gradient(135deg,var(--navy) 0%,#2A5083 100%);display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:14px;padding:40px;box-shadow:0 20px 60px rgba(0,0,0,.25);max-width:420px;width:100%}
.card img{height:48px;width:auto;display:block;margin-bottom:24px}
h1{font-family:Montserrat,sans-serif;color:var(--navy);font-size:22px;margin:0 0 6px}
p.sub{color:var(--muted);font-size:14px;margin:0 0 24px}
label{display:block;font-family:Montserrat,sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--navy);margin-bottom:8px}
input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:8px;font-size:16px;font-family:Inter,sans-serif}
input.code{font-family:'SF Mono','Menlo',monospace;font-size:24px;letter-spacing:8px;text-align:center}
input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,147,42,.15)}
button{width:100%;background:var(--gold);color:#fff;border:none;padding:14px;border-radius:8px;font-family:Montserrat,sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-top:16px;transition:background .15s}
button:hover{background:#A07F1E}
button:disabled{opacity:.5;cursor:not-allowed}
.err{background:#FEF2F2;color:#991B1B;border:1px solid #FCA5A5;border-radius:8px;padding:12px 14px;font-size:13px;margin-top:12px;display:none}
.err.show{display:block}
.ok{background:#D1FAE5;color:#065F46;border:1px solid #6EE7B7;border-radius:8px;padding:12px 14px;font-size:13px;margin-top:12px}
.footer{text-align:center;font-size:12px;color:var(--muted);margin-top:24px}
.step{display:none}
.step.active{display:block}
.link{background:none;border:none;color:var(--gold);font-size:13px;cursor:pointer;padding:0;margin-top:14px;text-decoration:underline;width:auto}
</style>
</head>
<body>
  <div class="card">
    <img src="/images/logo-dark.webp" alt="Relokates Removals">

    <!-- STEP 1: PASSWORD -->
    <div class="step active" id="step1">
      <h1>Admin sign in</h1>
      <p class="sub">Enter the admin password to access the quote and booking dashboard.</p>
      <form id="loginForm">
        <label for="pw">Password</label>
        <input type="password" id="pw" name="password" required autocomplete="current-password">
        <div class="err" id="err1"></div>
        <button type="submit" id="btn1">Continue</button>
      </form>
    </div>

    <!-- STEP 2: 6-DIGIT SMS CODE -->
    <div class="step" id="step2">
      <h1>Verification code</h1>
      <p class="sub">We sent a 6-digit code to your registered phone. Enter it below.</p>
      <form id="codeForm">
        <label for="code">Code</label>
        <input class="code" type="text" id="code" inputmode="numeric" pattern="[0-9]*" maxlength="6" required autocomplete="one-time-code">
        <div class="err" id="err2"></div>
        <button type="submit" id="btn2">Verify and sign in</button>
        <button type="button" class="link" id="backBtn">Use a different password</button>
      </form>
    </div>

    <p class="footer">Relokates Removals - Company No. 13441775</p>
  </div>

<script>
const step1 = document.getElementById('step1');
const step2 = document.getElementById('step2');
const err1 = document.getElementById('err1');
const err2 = document.getElementById('err2');
const btn1 = document.getElementById('btn1');
const btn2 = document.getElementById('btn2');
let attemptId = null;

function showErr(el, msg) { el.textContent = msg; el.classList.add('show'); }
function clearErr(el) { el.classList.remove('show'); }
function go(stepEl) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  stepEl.classList.add('active');
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearErr(err1);
  btn1.disabled = true; btn1.textContent = 'Checking...';
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: document.getElementById('pw').value }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      showErr(err1, data.error || 'Sign in failed');
      return;
    }
    if (!data.twofa) {
      window.location.href = '/admin/dashboard';
      return;
    }
    attemptId = data.attempt_id;
    go(step2);
    setTimeout(() => document.getElementById('code').focus(), 50);
  } catch (e) {
    showErr(err1, 'Network error - try again');
  } finally {
    btn1.disabled = false; btn1.textContent = 'Continue';
  }
});

document.getElementById('codeForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearErr(err2);
  btn2.disabled = true; btn2.textContent = 'Verifying...';
  try {
    const res = await fetch('/api/admin/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ attempt_id: attemptId, code: document.getElementById('code').value }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      showErr(err2, data.error || 'Verification failed');
      return;
    }
    window.location.href = '/admin/dashboard';
  } catch (e) {
    showErr(err2, 'Network error - try again');
  } finally {
    btn2.disabled = false; btn2.textContent = 'Verify and sign in';
  }
});

document.getElementById('backBtn').addEventListener('click', () => {
  attemptId = null;
  document.getElementById('code').value = '';
  clearErr(err2);
  go(step1);
});
</script>
</body>
</html>
